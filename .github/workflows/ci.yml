name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.11"
          - "3.12"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: python -m pip install .

      - name: Verify package resources
        run: |
          python - <<'PY'
          import importlib.resources as resources
          static_dir = resources.files("ops_pilot") / "static"
          assert (static_dir / "index.html").is_file()
          assert (static_dir / "app.js").is_file()
          assert (static_dir / "style.css").is_file()
          print("Static assets available.")
          PY

      - name: Compile sources
        run: python -m compileall src tests run_demo.py run_review_demo.py run_server.py

      - name: Run automated tests
        env:
          PYTHONPATH: src
        run: python -m unittest discover -s tests -v

      - name: Run deterministic demo
        env:
          PYTHONPATH: src
          OPS_PILOT_AGENT_MODE: deterministic
        run: python run_demo.py

      - name: Run deterministic review demo
        env:
          PYTHONPATH: src
          OPS_PILOT_AGENT_MODE: deterministic
        run: python run_review_demo.py
